name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NFL_MCP_DB_PATH: ${{ github.workspace }}/.nfl-mcp-ci/nflread.duckdb
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Ingest all datasets for E2E tests
        run: nfl-mcp ingest --dataset all --start 2024 --end 2024

      - name: Run tests with coverage
        # --cov-fail-under=100 gates the build on no coverage regression.
        # Kept on the CI command (not pyproject addopts) so local unit-only
        # runs (`pytest -m unit`) are not held to the full-suite floor.
        run: pytest -q --cov-fail-under=100

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
