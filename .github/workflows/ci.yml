name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NFL_MCP_DB_PATH: ${{ github.workspace }}/.nfl-mcp-ci/nflread.duckdb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Ingest 2024 data for E2E tests
        run: nfl-mcp ingest --start 2024 --end 2024

      - name: Run tests
        run: pytest -q
